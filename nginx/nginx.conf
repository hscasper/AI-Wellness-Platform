# =============================================================================
# nginx.conf — Production configuration for TLS termination, HTTP redirect,
#              security headers, and reverse proxy to auth-service.
#
# PURPOSE:
#   This is the production nginx config used AFTER Let's Encrypt certificates
#   have been provisioned via nginx-bootstrap.conf + certbot.
#   nginx terminates TLS at the edge; all internal services communicate over
#   plain HTTP within the Docker network.
#
# BOOTSTRAP WORKFLOW:
#   1. Start with nginx-bootstrap.conf to obtain certificates (see that file).
#   2. Once certificates exist, switch to this file in docker-compose.yml:
#        ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#   3. Reload nginx: docker compose exec nginx nginx -s reload
#
# REQUIRED: Replace every occurrence of ${DOMAIN_NAME} with your actual domain.
#   Example: sakina.example.com
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP server — redirects all traffic to HTTPS, serves ACME challenge for
# certificate renewals.
# ---------------------------------------------------------------------------
server {
    listen 80;

    # REPLACE: Set your domain name here (e.g., sakina.example.com)
    server_name ${DOMAIN_NAME};

    # Serve ACME challenge files for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS permanently
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server — TLS termination, security headers, proxy to auth-service.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;

    # REPLACE: Change ${DOMAIN_NAME} to your actual domain (e.g., sakina.example.com)
    server_name ${DOMAIN_NAME};

    # Let's Encrypt certificate paths (set by certbot)
    # REPLACE: Change ${DOMAIN_NAME} to your actual domain in both paths below
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    # TLS protocol and cipher settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers — applied to all responses
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    # -----------------------------------------------------------------------
    # Static legal documents (Apple Guideline 5.1.1 / Google Play: a public
    # Privacy Policy URL is mandatory for App Store Connect and Play Console).
    # Served directly by nginx — no auth-service dependency, so they remain
    # reachable even during backend deploys or outages.
    # -----------------------------------------------------------------------
    location = /privacy {
        alias /etc/nginx/legal/privacy.html;
        default_type text/html;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /privacy/ {
        return 301 /privacy;
    }
    location = /terms {
        alias /etc/nginx/legal/terms.html;
        default_type text/html;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /terms/ {
        return 301 /terms;
    }

    # -----------------------------------------------------------------------
    # Universal Links (iOS) + App Links (Android) — Issue 13.
    # Both platforms require the files to be served over HTTPS from the app's
    # associated domain with an exact content-type and no redirects. We also
    # intentionally disable the HSTS/security headers that iOS's swcd would
    # otherwise ignore — the payload is public, cacheable, and text-only.
    # -----------------------------------------------------------------------
    location = /.well-known/apple-app-site-association {
        alias /etc/nginx/well-known/apple-app-site-association;
        # iOS requires application/json but the file MUST NOT have a .json
        # extension. Setting the type explicitly covers both historical and
        # current behaviour of Apple's switchboard daemon (swcd).
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /.well-known/assetlinks.json {
        alias /etc/nginx/well-known/assetlinks.json;
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy all other requests to the auth-service gateway (which handles YARP
    # routing to downstream services: chat, notifications, journal, community).
    location / {
        proxy_pass         http://auth-service:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
