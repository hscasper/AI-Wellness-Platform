# =============================================================================
# nginx-bootstrap.conf — Bootstrap configuration for initial TLS certificate
#                         acquisition via Let's Encrypt (certbot).
#
# PURPOSE:
#   Use this config BEFORE any TLS certificates exist. It serves only the
#   ACME HTTP-01 challenge on port 80 so certbot can obtain the first cert.
#   It does NOT terminate TLS (no certificates are required to start nginx).
#
# BOOTSTRAP WORKFLOW:
#   1. Mount this file as the active config:
#        ./nginx/nginx-bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
#   2. Start the stack: docker compose up -d nginx certbot
#   3. Obtain the certificate:
#        docker compose run --rm certbot certonly \
#          --webroot -w /var/www/certbot \
#          -d YOUR_DOMAIN \
#          --email YOUR_EMAIL \
#          --agree-tos --no-eff-email
#   4. Switch to the production config in docker-compose.yml:
#        ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#   5. Reload nginx: docker compose exec nginx nginx -s reload
# =============================================================================

server {
    listen 80;
    server_name _;

    # Serve ACME challenge files for certbot webroot validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other requests return 503 — certificates are not yet provisioned
    location / {
        return 503 "Service starting — waiting for TLS certificate";
        add_header Content-Type text/plain always;
    }
}
