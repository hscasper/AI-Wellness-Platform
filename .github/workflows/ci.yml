name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      # Don't let one service failing mask a coverage regression in another.
      fail-fast: false
      matrix:
        include:
          # Coverage thresholds are enforced via coverlet.msbuild. Auth and the AI
          # wrapper sit on the critical path (handling credentials and LLM traffic
          # respectively), so they are held to 80% line coverage. The rest of the
          # services are held to 60% line coverage, which is the app-store-readiness
          # minimum documented in the Week 2 plan.
          - name: auth-service
            path: auth-service/AuthService.Tests/AuthService.Tests.csproj
            threshold: '80'
          - name: ai-wrapper-service
            path: AI-Wrapper-Service/AIWrapperService.Tests/AIWrapperService.Tests.csproj
            threshold: '80'
          - name: chat-service
            path: chat-service/ChatService.Tests/ChatService.Tests.csproj
            threshold: '60'
          - name: notification-service
            path: notification-service/src/NotificationService.Tests/NotificationService.Tests.csproj
            threshold: '60'
          - name: journal-service
            path: journal-service/src/JournalService.Tests/JournalService.Tests.csproj
            threshold: '60'
          - name: community-service
            path: community-service/CommunityService.Tests/CommunityService.Tests.csproj
            threshold: '60'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore ${{ matrix.name }}
        run: dotnet restore "${{ matrix.path }}"

      - name: Test ${{ matrix.name }} with ${{ matrix.threshold }}% line coverage gate
        run: |
          dotnet test "${{ matrix.path }}" --no-restore --verbosity normal \
            -p:CollectCoverage=true \
            -p:CoverletOutputFormat=cobertura \
            -p:CoverletOutput=./TestResults/coverage.cobertura.xml \
            -p:Threshold=${{ matrix.threshold }} \
            -p:ThresholdType=line \
            -p:ThresholdStat=total \
            -p:ExcludeByAttribute='"Obsolete,GeneratedCodeAttribute,CompilerGeneratedAttribute"'

      - name: Upload coverage report for ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: '**/TestResults/coverage.cobertura.xml'
          retention-days: 14

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 14

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Run after the frontend unit tests so we know the install step succeeds.
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            package-lock.json

      # Install the Expo frontend dependencies so we can build the web output.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Install the root-level Playwright devDependencies.
      - name: Install E2E dependencies
        run: npm ci

      # Install only the Chromium browser to keep CI fast.
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Build the Expo web bundle. The output lands in frontend/dist/.
      - name: Build Expo web
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: http://localhost:5051
          EXPO_PUBLIC_DEV_MODE: "false"
        run: npx expo export --platform web

      # Serve the static bundle on port 8081 in the background.
      - name: Serve static Expo web build
        run: npx serve frontend/dist -l 8081 &
        # Give the server a moment to bind before tests start.

      - name: Wait for static server to be ready
        run: npx wait-on http://localhost:8081 --timeout 30000

      # Run the E2E suite against the static build.
      # Tests that require a live backend will gracefully assert the error path.
      - name: Run Playwright E2E tests
        env:
          E2E_BASE_URL: http://localhost:8081
          CI: "true"
        run: npx playwright test

      # Always upload artifacts so failures can be debugged.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  secret-scan:
    # Gitleaks is the post-rotation gate from SEC-ADV-03: we accept the
    # existing history but never want a new secret to land on main. A finding
    # here is a blocking failure — rotate and repush, don't merge through.
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can cover the whole PR range, not just
          # the tip commit. Shallow clones miss stacked commits.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ignore the two known-historical strings we already accepted in
          # SEC-ADV-03 so they don't re-alert forever. Everything else is a
          # real finding.
          GITLEAKS_CONFIG: .gitleaks.toml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
