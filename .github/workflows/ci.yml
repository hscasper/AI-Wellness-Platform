name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: auth-service
            path: auth-service/AuthService.Tests/AuthService.Tests.csproj
          - name: chat-service
            path: chat-service/ChatService.Tests/ChatService.Tests.csproj
          - name: ai-wrapper-service
            path: AI-Wrapper-Service/AIWrapperService.Tests/AIWrapperService.Tests.csproj
          - name: notification-service
            path: notification-service/src/NotificationService.Tests/NotificationService.Tests.csproj
          - name: journal-service
            path: journal-service/src/JournalService.Tests/JournalService.Tests.csproj
          - name: community-service
            path: community-service/CommunityService.Tests/CommunityService.Tests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore ${{ matrix.name }}
        run: dotnet restore "${{ matrix.path }}"

      - name: Test ${{ matrix.name }}
        run: dotnet test "${{ matrix.path }}" --no-restore --verbosity normal

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm test

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Run after the frontend unit tests so we know the install step succeeds.
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            package-lock.json

      # Install the Expo frontend dependencies so we can build the web output.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Install the root-level Playwright devDependencies.
      - name: Install E2E dependencies
        run: npm ci

      # Install only the Chromium browser to keep CI fast.
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Build the Expo web bundle. The output lands in frontend/dist/.
      - name: Build Expo web
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: http://localhost:5051
          EXPO_PUBLIC_DEV_MODE: "false"
        run: npx expo export --platform web

      # Serve the static bundle on port 8081 in the background.
      - name: Serve static Expo web build
        run: npx serve frontend/dist -l 8081 &
        # Give the server a moment to bind before tests start.

      - name: Wait for static server to be ready
        run: npx wait-on http://localhost:8081 --timeout 30000

      # Run the E2E suite against the static build.
      # Tests that require a live backend will gracefully assert the error path.
      - name: Run Playwright E2E tests
        env:
          E2E_BASE_URL: http://localhost:8081
          CI: "true"
        run: npx playwright test

      # Always upload artifacts so failures can be debugged.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
