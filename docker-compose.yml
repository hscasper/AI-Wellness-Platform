services:
  # ---------------------------------------------------------------------------
  # NGINX — TLS termination edge proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: wellness_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # To bootstrap certificates for the first time, temporarily replace
      # nginx.conf with nginx-bootstrap.conf in the volume mount below,
      # run certbot, then switch back.
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      auth-service:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # CERTBOT — Let's Encrypt certificate provisioning and renewal
  # ---------------------------------------------------------------------------
  # To obtain initial certificate:
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d YOUR_DOMAIN --email YOUR_EMAIL --agree-tos --no-eff-email
  # To renew:
  #   docker compose run --rm certbot renew
  #   docker compose exec nginx nginx -s reload
  certbot:
    image: certbot/certbot
    container_name: wellness_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

  # ---------------------------------------------------------------------------
  # NOTIFICATION STACK
  # ---------------------------------------------------------------------------
  notification-db:
    image: postgres:16
    container_name: notification-db
    environment:
      POSTGRES_DB: wellness_notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    ports:
      - '5333:5432'
    volumes:
      - notification_db_data:/var/lib/postgresql/data
      - ./notification-service/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wellness_notifications']
      interval: 5s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: ./notification-service
      dockerfile: dockerfile
    container_name: notification_service_api
    depends_on:
      notification-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: 'Production'
      ASPNETCORE_URLS: 'http://+:8080'
      ConnectionStrings__NotificationDatabase: 'Host=notification-db;Database=wellness_notifications;Username=postgres;Password=${NOTIFICATION_DB_PASSWORD}'
      Gateway__SharedSecret: '${NOTIFICATION_INTERNAL_API_KEY}'
      Gateway__RequireSharedSecret: 'true'
      NotificationScheduler__IntervalMinutes: '2'
      Email__Smtp__Host: 'smtp.sendgrid.net'
      Email__Smtp__Port: '587'
      Email__Smtp__EnableSsl: 'true'
      Email__Smtp__Username: 'apikey'
      Email__Smtp__Password: '${SENDGRID_API_KEY}'
      Email__Smtp__FromAddress: '${SENDGRID_FROM_EMAIL}'
      Email__Smtp__FromName: '${SENDGRID_FROM_NAME:-AI Wellness}'
    ports:
      - '8082:8080'

  # ---------------------------------------------------------------------------
  # CHAT Service + AI Wrapper STACK
  # ---------------------------------------------------------------------------
  chat-db:
    image: postgres:16
    container_name: chat_service_db
    environment:
      POSTGRES_USER: ${CHAT_DB_USER}
      POSTGRES_PASSWORD: ${CHAT_DB_PASSWORD}
      POSTGRES_DB: chatservicedb
    ports:
      - '5335:5432'
    volumes:
      - chat_db_data:/var/lib/postgresql/data
      - ./chat-service/Database/Scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d chatservicedb']
      interval: 5s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    container_name: wellness_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '16379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping | grep PONG']
      interval: 5s
      timeout: 5s
      retries: 10
  ai-wrapper-service:
    build:
      context: ./AI-Wrapper-Service
      dockerfile: Dockerfile
    container_name: ai_wrapper_service_api
    ports:
      - '8085:8080'
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - AiService__InternalApiKey=${AI_INTERNAL_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - OpenAI__BaseUrl=${OPENAI_BASE_URL:-https://api.openai.com/v1/}
      - OpenAI__Model=${OPENAI_MODEL:-wellness-chat:latest}
      - AiService__RateLimitPerMinute=60
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
  chat-service:
    build:
      context: ./chat-service
      dockerfile: dockerfile
    container_name: chat_service_api
    depends_on:
      chat-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      ai-wrapper-service:
        condition: service_healthy
    ports:
      - '5050:8080'
    environment:
      ASPNETCORE_URLS: 'http://+:8080'
      ChatService__BaseUrl: 'http://ai_wrapper_service_api:8080/'
      ChatService__ApiKey: '${AI_INTERNAL_API_KEY}'
      ConnectionStrings__PostgreSqlConnectionString: 'Host=chat-db;Port=5432;Database=chatservicedb;Username=${CHAT_DB_USER};Password=${CHAT_DB_PASSWORD};'
      ConnectionStrings__Redis: 'redis-cache:6379,password=${REDIS_PASSWORD}'
      Jwt__Key: '${JWT_KEY}'
      Jwt__Issuer: 'AIWellness'
      Jwt__Audience: 'AIWellnessUsers'
  # ---------------------------------------------------------------------------
  # JOURNAL STACK
  # ---------------------------------------------------------------------------
  journal-db:
    image: postgres:16
    container_name: journal_service_db
    environment:
      POSTGRES_DB: wellness_journal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${JOURNAL_DB_PASSWORD}
    ports:
      - '5336:5432'
    volumes:
      - journal_db_data:/var/lib/postgresql/data
      - ./journal-service/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wellness_journal']
      interval: 5s
      timeout: 5s
      retries: 10

  journal-service:
    build:
      context: ./journal-service
      dockerfile: dockerfile
    container_name: journal_service_api
    depends_on:
      journal-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: 'Production'
      ASPNETCORE_URLS: 'http://+:8080'
      ConnectionStrings__JournalDatabase: 'Host=journal-db;Database=wellness_journal;Username=postgres;Password=${JOURNAL_DB_PASSWORD}'
      Gateway__SharedSecret: '${JOURNAL_INTERNAL_API_KEY}'
      Gateway__RequireSharedSecret: 'true'
    ports:
      - '8083:8080'

  # ---------------------------------------------------------------------------
  # COMMUNITY STACK
  # ---------------------------------------------------------------------------
  community-db:
    image: postgres:16
    container_name: community_service_db
    environment:
      POSTGRES_DB: wellness_community
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${COMMUNITY_DB_PASSWORD}
    ports:
      - '5337:5432'
    volumes:
      - community_db_data:/var/lib/postgresql/data
      - ./community-service/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wellness_community']
      interval: 5s
      timeout: 5s
      retries: 10

  community-service:
    build:
      context: ./community-service
      dockerfile: dockerfile
    container_name: community_service_api
    depends_on:
      community-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: 'Production'
      ASPNETCORE_URLS: 'http://+:8080'
      ConnectionStrings__CommunityDatabase: 'Host=community-db;Database=wellness_community;Username=postgres;Password=${COMMUNITY_DB_PASSWORD}'
      Gateway__SharedSecret: '${COMMUNITY_INTERNAL_API_KEY}'
      Gateway__RequireSharedSecret: 'true'
    ports:
      - '8084:8080'

  #----------------------------------------------------------------------------
  # AUTHENTICATION STACK
  # ---------------------------------------------------------------------------
  auth-db:
    image: postgres:16
    container_name: auth_service_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: authdb
    ports:
      - '5334:5432'
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/Database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d authdb']
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service_api
    depends_on:
      auth-db:
        condition: service_healthy
      notification-service:
        condition: service_started
      journal-service:
        condition: service_started
      chat-service:
        condition: service_started
      community-service:
        condition: service_started
    # No host port — only accessible via nginx reverse proxy
    expose:
      - '8080'
    environment:
      ConnectionStrings__PostgreSQL: 'Host=auth-db;Port=5432;Database=authdb;Username=postgres;Password=${AUTH_DB_PASSWORD};'
      Jwt__Key: '${JWT_KEY}'
      Jwt__Issuer: 'AIWellness'
      Jwt__Audience: 'AIWellnessUsers'
      Jwt__ExpiryInMinutes: '60'
      ReverseProxy__Clusters__chat-cluster__Destinations__chat-service__Address: 'http://chat-service:8080/'
      ReverseProxy__Clusters__notification-cluster__Destinations__notification-service__Address: 'http://notification-service:8080/'
      ReverseProxy__Clusters__journal-cluster__Destinations__journal-service__Address: 'http://journal-service:8080/'
      ReverseProxy__Clusters__community-cluster__Destinations__community-service__Address: 'http://community-service:8080/'
      NotificationService__BaseUrl: 'http://notification-service:8080'
      NotificationService__ApiKey: '${NOTIFICATION_INTERNAL_API_KEY}'
      CommunityService__ApiKey: '${COMMUNITY_INTERNAL_API_KEY}'
      Cors__AllowedOrigins__0: '${CORS_ORIGIN_0:-}'
      ASPNETCORE_URLS: 'http://+:8080'
      ASPNETCORE_ENVIRONMENT: 'Production'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/api/auth/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
# ---------------------------------------------------------------------------
# VOLUMES
# ---------------------------------------------------------------------------
volumes:
  notification_db_data:
  chat_db_data:
  journal_db_data:
  auth_db_data:
  community_db_data:
  certbot_webroot:
  certbot_certs:
